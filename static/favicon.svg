<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="A cute potato, the Antiques Inference Engine">
  <!-- brand purple tile so it pops on any browser tab -->
  <rect width="64" height="64" rx="14" fill="#4a0873"/>
  <!-- a little lime sprout (growth = power) -->
  <path d="M32 30 C 30 22 25 19 20 20 C 24 24 27 27 32 31 Z" fill="#5bb545"/>
  <path d="M32 31 C 34 23 39 21 44 22 C 40 26 37 28 32 32 Z" fill="#6fc23e"/>
  <path d="M32 33 V 22" fill="none" stroke="#357612" stroke-width="2.4" stroke-linecap="round"/>
  <!-- potato body -->
  <ellipse cx="32" cy="41" rx="19" ry="14.5" fill="#d9b27a" transform="rotate(-8 32 41)"/>
  <!-- skin spots -->
  <ellipse cx="22" cy="45" rx="1.7" ry="1.2" fill="#bd9156"/>
  <ellipse cx="42" cy="37" rx="1.5" ry="1" fill="#bd9156"/>
  <ellipse cx="39" cy="49" rx="1.3" ry="1" fill="#bd9156"/>
  <ellipse cx="26" cy="34" rx="1.2" ry="0.9" fill="#bd9156"/>
  <!-- rosy cheeks -->
  <ellipse cx="24" cy="44" rx="3.1" ry="2.1" fill="#e89a72" opacity="0.55"/>
  <ellipse cx="41" cy="43" rx="3.1" ry="2.1" fill="#e89a72" opacity="0.55"/>
  <!-- eyes + highlights -->
  <circle cx="27" cy="40" r="2.5" fill="#3a2a1a"/>
  <circle cx="38" cy="39" r="2.5" fill="#3a2a1a"/>
  <circle cx="27.9" cy="39.1" r="0.85" fill="#fff"/>
  <circle cx="38.9" cy="38.1" r="0.85" fill="#fff"/>
  <!-- smile -->
  <path d="M28 45 Q 32.7 49.5 37.4 44.4" fill="none" stroke="#3a2a1a" stroke-width="2" stroke-linecap="round"/>
</svg>
